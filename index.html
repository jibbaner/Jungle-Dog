<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUNGLE DØG — Bern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --beige: #FFFFE5;
  --red:   #ED3221;
  --green: #1AAA5A;
  --dark:  #111111;
  --font:  'Space Grotesk', sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--beige);
  font-family: var(--font);
}

/* ── BACKGROUND IMAGE (parallax + zooms on click) ── */
#bg {
  position: fixed;
  inset: -5%;
  width: 110%;
  height: 110%;
  background-image: url('uploads/jungle-dog-in-bern.png');
  background-size: cover;
  background-position: center;
  transform: scale(1.06);
  transform-origin: center center;
  will-change: transform;
  z-index: 0;
}

/* beige overlay so text stays readable */
#bg-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background: rgba(255, 255, 229, 0.72);
  transition: opacity 0.6s ease 0.8s;
  pointer-events: none;
}
#bg-overlay.hidden { opacity: 0; }

/* ── INTRO LAYER ── */
#intro {
  position: fixed;
  inset: 0;
  z-index: 10;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 48px 24px 120px;
  transition: opacity 0.6s ease 0.8s;
}
#intro.hidden {
  opacity: 0;
  pointer-events: none;
}

/* ── EYEBROW ── */
.intro-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--dark);
  opacity: 0;
  transform: translateY(15px);
  animation: fadeUp 0.75s cubic-bezier(0.645, 0.045, 0.355, 1) 0.2s forwards;
  margin-bottom: 40px;
}
.eyebrow-dot {
  width: 8px; height: 8px;
  background: var(--green);
  border: 2px solid var(--dark);
  flex-shrink: 0;
}

/* ── TITLE ── */
.intro-title {
  font-size: clamp(2.2rem, 6vw, 7rem);
  font-weight: 900;
  line-height: 0.9;
  letter-spacing: -0.03em;
  text-transform: uppercase;
  color: var(--dark);
  max-width: 900px;
  opacity: 0;
  transform: translateY(15px);
  animation: fadeUp 0.75s cubic-bezier(0.645, 0.045, 0.355, 1) 0.45s forwards;
  margin-bottom: 32px;
}
.intro-title .hl {
  display: inline-block;
  background: var(--red);
  color: var(--beige);
  border: 4px solid var(--dark);
  box-shadow: 6px 6px 0 var(--dark);
  padding: 2px 20px;
  margin-top: 8px;
}

/* ── SUBTITLE ── */
.intro-sub {
  font-size: clamp(1rem, 2vw, 1.4rem);
  font-weight: 500;
  line-height: 1.55;
  color: rgba(17,17,17,0.6);
  max-width: 520px;
  opacity: 0;
  transform: translateY(15px);
  animation: fadeUp 0.75s cubic-bezier(0.645, 0.045, 0.355, 1) 0.7s forwards;
}

/* ── BUTTON (fixed bottom, like Max Mara) ── */
.intro-btn-wrap {
  position: fixed;
  bottom: clamp(32px, 5vw, 56px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  opacity: 0;
  animation: fadeUp 0.75s cubic-bezier(0.645, 0.045, 0.355, 1) 1.0s forwards;
}
.intro-btn-wrap.hidden {
  opacity: 0 !important;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

.intro-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  font-family: var(--font);
  font-size: clamp(12px, 1.4vw, 15px);
  font-weight: 900;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  text-decoration: none;
  color: var(--dark);
  background: var(--beige);
  border: 4px solid var(--dark);
  box-shadow: 6px 6px 0 var(--dark);
  padding: 18px 40px;
  cursor: pointer;
  white-space: nowrap;
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}
.intro-btn:hover {
  box-shadow: 2px 2px 0 var(--dark);
  transform: translate(4px, 4px);
}
.intro-btn svg {
  transition: transform 0.3s ease;
}
.intro-btn:hover svg {
  transform: translateX(4px);
}

/* ── LOGO (top left) ── */
.intro-logo {
  position: fixed;
  top: 32px;
  left: 40px;
  z-index: 20;
  font-size: 18px;
  font-weight: 900;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: var(--dark);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.1s forwards;
}
.intro-logo img { height: 28px; width: auto; }
.intro-logo .ø { color: var(--red); }

/* ── ANIMATION ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(15px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .intro-eyebrow, .intro-title, .intro-sub, .intro-btn-wrap, .intro-logo {
    animation: none;
    opacity: 1;
    transform: none;
  }
  #bg { transition: none; }
}
</style>
</head>
<body>

<div id="bg"></div>
<div id="bg-overlay"></div>

<a href="/map" class="intro-logo" aria-label="Jungle Dog Startseite">
  <img src="uploads/Jungle Dog Logo.svg" alt="Jungle Dog Logo">
  JUNGLE D<span class="ø">Ø</span>G
</a>

<div id="intro">
  <div class="intro-eyebrow">
    <span class="eyebrow-dot"></span>
    Bern · Urban Farming · Chilisauce
  </div>
  <h1 class="intro-title">
    Der Jungle Dog<br>
    im Berner<br>
    <span class="hl">Grossstadtjungel.</span>
  </h1>
  <p class="intro-sub">
    Finde den Dog, um mehr über ihn und seine Saucen zu erfahren.
  </p>
</div>

<div class="intro-btn-wrap" id="btn-wrap">
  <a href="/map" class="intro-btn" id="cta-btn">
    Den Dog finden
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</div>

<script>
const btn       = document.getElementById('cta-btn');
const intro     = document.getElementById('intro');
const btnWrap   = document.getElementById('btn-wrap');
const bg        = document.getElementById('bg');
const bgOverlay = document.getElementById('bg-overlay');

// ── MOUSE PARALLAX ──────────────────────────────────────────────
// Smooth LERP-based parallax identical to Max Mara's Apollo system.
// Mouse offset from centre → gentle translate on the background image.
// Range: ±20px horizontal, ±14px vertical (scaled by viewport).
const PARALLAX_X  = 20;   // max px shift left/right
const PARALLAX_Y  = 14;   // max px shift up/down
const LERP_FACTOR = 0.06; // smoothing (0 = never arrives, 1 = instant) — ~750ms feel

let mouseX = 0, mouseY = 0;   // raw target (normalised –1…1)
let curX   = 0, curY   = 0;   // current smoothed value
let animating = false;         // becomes false after click

document.addEventListener('pointermove', (e) => {
  mouseX = (e.clientX / window.innerWidth  * 2 - 1); // –1 … +1
  mouseY = (e.clientY / window.innerHeight * 2 - 1);
}, { passive: true });

function parallaxLoop() {
  if (animating) return; // hand off to zoom animation on click

  // LERP toward target
  curX += (mouseX - curX) * LERP_FACTOR;
  curY += (mouseY - curY) * LERP_FACTOR;

  const tx = curX * PARALLAX_X;
  const ty = curY * PARALLAX_Y;

  // Keep base scale slightly >1 so parallax shift never reveals edges
  bg.style.transform = `scale(1.06) translate(${tx}px, ${ty}px)`;

  requestAnimationFrame(parallaxLoop);
}

// Start loop once bg is visible (it fades in via CSS opacity)
requestAnimationFrame(parallaxLoop);

// ── CLICK → ZOOM ────────────────────────────────────────────────
btn.addEventListener('click', function(e) {
  e.preventDefault();
  const dest = btn.getAttribute('href');

  animating = true;

  // Fade out text, button and overlay
  intro.classList.add('hidden');
  btnWrap.classList.add('hidden');
  bgOverlay.classList.add('hidden');

  // Override parallax transform with CSS zoom transition
  bg.style.transition = 'transform 1.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 1.4s cubic-bezier(0.4, 0, 0.2, 1)';
  requestAnimationFrame(() => {
    bg.style.transform = 'scale(1.18)';
    bg.style.opacity   = '1';
  });

  setTimeout(() => { window.location.href = dest; }, 1400);
});
</script>

</body>
</html>
